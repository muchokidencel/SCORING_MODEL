name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate --workspace server
      - run: npm run lint --workspace server
      - run: npm run typecheck --workspace server
      - run: npm run test --workspace server
      - run: npm run build --workspace server

  client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint --workspace client
      - run: npm run typecheck --workspace client
      - run: npm run test --workspace client
      - run: npm run build --workspace client

  # Placeholder per the implementation plan ("CI: axe/Lighthouse/Playwright
  # jobs wired now, even with little to test"). Real checks land as screens
  # with real user flows exist to scan, from Epic 1 onward.
  accessibility-and-visual:
    runs-on: ubuntu-latest
    needs: [client]
    steps:
      - uses: actions/checkout@v4
      - name: axe / Lighthouse / Playwright placeholder
        run: echo "No user flows to scan yet beyond login — wired for Epic 1 onward."
